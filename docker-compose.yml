version: '3.8'

services:
  # قاعدة البيانات PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: samirmax_postgres
    environment:
      POSTGRES_DB: samirmax_ai
      POSTGRES_USER: samirmax_user
      POSTGRES_PASSWORD: samirmax_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samirmax_user -d samirmax_ai"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - samirmax_network

  # Redis للتخزين المؤقت
  redis:
    image: redis:7-alpine
    container_name: samirmax_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - samirmax_network

  # الخادم الخلفي FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samirmax_backend
    environment:
      - DATABASE_URL=postgresql://samirmax_user:samirmax_password@postgres:5432/samirmax_ai
      - REDIS_URL=redis://redis:6379
      - DEBUG=True
      - SECRET_KEY=your-secret-key-change-in-production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - samirmax_network
    restart: unless-stopped

  # الواجهة الأمامية React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: samirmax_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_VERSION=1.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - samirmax_network
    restart: unless-stopped

  # Nginx للProxy العكسي (اختياري للإنتاج)
  nginx:
    image: nginx:alpine
    container_name: samirmax_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - uploads:/usr/share/nginx/html/uploads
    depends_on:
      - backend
      - frontend
    networks:
      - samirmax_network
    profiles:
      - production

  # خدمة معالجة المهام الثقيلة (Celery Worker)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samirmax_celery_worker
    command: celery -A app.main worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://samirmax_user:samirmax_password@postgres:5432/samirmax_ai
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - samirmax_network
    restart: unless-stopped
    profiles:
      - production

  # خدمة جدولة المهام (Celery Beat)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samirmax_celery_beat
    command: celery -A app.main beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://samirmax_user:samirmax_password@postgres:5432/samirmax_ai
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - samirmax_network
    restart: unless-stopped
    profiles:
      - production

  # مراقبة Celery (Flower)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samirmax_flower
    command: celery -A app.main flower --port=5555
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - samirmax_network
    profiles:
      - monitoring

# مجلدات البيانات المستديمة
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  node_modules:
    driver: local

# شبكة مخصصة
networks:
  samirmax_network:
    driver: bridge

# إعدادات متقدمة
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"